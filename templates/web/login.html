<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>JISAN PAIN HOSTING | Secure Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #00FF41;
            --accent-glow: rgba(0, 255, 65, 0.4);
            --accent-dark: #00CC33;
            --bg: #000000;
            --card-bg: rgba(0, 10, 0, 0.78);
            --border: rgba(0, 255, 65, 0.35);
            --input-bg: rgba(0, 255, 65, 0.08);
            --text-secondary: #88FF88;
        }

        body {
            background-color: var(--bg);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            position: relative;
        }

        /* SMOOTH CODE RAIN CANVAS BACKGROUND - GREEN */
        #codeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            opacity: 0.6;
        }

        /* Gradient overlay for better readability */
        .overlay-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.4), rgba(0,0,0,0.85));
            pointer-events: none;
            z-index: 1;
        }

        /* Login Card */
        .login-card {
            width: 92%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1.5px solid rgba(0, 255, 65, 0.4);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 255, 65, 0.15);
            z-index: 10;
            position: relative;
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .brand-icon {
            width: 80px; 
            height: 80px;
            background: linear-gradient(145deg, #081a08, #102a10);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 38px; 
            color: var(--accent);
            border: 1px solid rgba(0, 255, 65, 0.4);
            box-shadow: 0 10px 25px rgba(0, 255, 65, 0.2);
            position: relative;
        }

        /* Pulse effect for icon - green theme */
        .brand-icon::after {
            content: '';
            position: absolute; 
            width: 100%; 
            height: 100%;
            border-radius: 22px; 
            border: 2px solid var(--accent);
            animation: pulseGreen 2.5s infinite;
        }

        @keyframes pulseGreen {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        h2 { 
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            margin: 0 0 8px; 
            color: #00FF41;
            text-shadow: 0 0 10px rgba(0,255,65,0.3);
        }
        
        .subtitle { 
            color: var(--text-secondary); 
            font-size: 14px; 
            margin-bottom: 35px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
        }

        .input-wrapper { 
            position: relative; 
            margin-bottom: 20px; 
        }
        
        .input-wrapper i.main-icon {
            position: absolute; 
            left: 18px; 
            top: 50%; 
            transform: translateY(-50%);
            color: #55aa55; 
            transition: 0.3s; 
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%; 
            padding: 18px 50px 18px 52px;
            background: var(--input-bg);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 18px; 
            color: #fff; 
            font-size: 16px;
            outline: none; 
            transition: all 0.3s ease;
            font-weight: 500;
            font-family: inherit;
        }

        .input-wrapper input:focus {
            background: rgba(0, 255, 65, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 255, 65, 0.2);
        }

        .input-wrapper input:focus ~ i.main-icon { 
            color: var(--accent); 
        }

        .input-wrapper input::placeholder {
            color: #336633;
        }

        .pass-toggle {
            position: absolute; 
            right: 18px; 
            top: 50%; 
            transform: translateY(-50%);
            color: #55aa55; 
            cursor: pointer; 
            padding: 5px; 
            transition: 0.2s;
        }
        
        .pass-toggle:hover { 
            color: #44FF44; 
        }

        .btn-submit {
            width: 100%; 
            padding: 18px;
            background: linear-gradient(135deg, #00AA22, #00FF41);
            border: none; 
            border-radius: 18px;
            color: #000000; 
            font-size: 17px; 
            font-weight: 800;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 255, 65, 0.3);
        }

        .btn-submit:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 15px 30px rgba(0, 255, 65, 0.5); 
        }
        
        .btn-submit:active { 
            transform: translateY(0); 
        }
        
        .btn-submit:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            transform: none; 
        }

        .footer-link { 
            margin-top: 25px; 
            font-size: 14px; 
            color: var(--text-secondary); 
        }
        
        .footer-link a { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 800; 
            transition: 0.2s; 
        }
        
        .footer-link a:hover { 
            opacity: 0.8;
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }

        /* Custom Alert Styling - Green Theme */
        .swal2-ios-custom {
            background: rgba(8, 20, 8, 0.95) !important;
            backdrop-filter: blur(25px) !important;
            border-radius: 24px !important;
            border: 1px solid rgba(0, 255, 65, 0.4) !important;
            color: #00FF41 !important;
        }

        @media (max-width: 400px) {
            .login-card { padding: 35px 20px; }
            h2 { font-size: 28px; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #050a05;
        }
        ::-webkit-scrollbar-thumb {
            background: #00FF41;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- SMOOTH CODE RAIN CANVAS BACKGROUND - GREEN -->
    <canvas id="codeCanvas"></canvas>
    <div class="overlay-gradient"></div>

    <div class="login-card">
        <div class="brand-icon">
            <i class="fa-solid fa-skull"></i>
        </div>
        <h2>JISAN <span style="color:#44FF44;">PAIN</span> HOSTING</h2>
        <p class="subtitle">⚡ Ultimate Pain Infrastructure ⚡</p>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-wrapper">
                <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
                <i class="fa-solid fa-envelope main-icon"></i>
            </div>
            
            <div class="input-wrapper">
                <input type="password" name="password" id="passInput" placeholder="Password" required>
                <i class="fa-solid fa-key main-icon"></i>
                <i class="fa-solid fa-eye-slash pass-toggle" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span>Secure Sign In</span>
                <i class="fa-solid fa-chevron-right" style="font-size: 14px;"></i>
            </button>
        </form>

        <div class="footer-link">
            New here? <a href="/signup">Create an account</a>
        </div>
    </div>

    <script>
        // ============================================================
        // SMOOTH CODE RAIN BACKGROUND ANIMATION - GREEN MATRIX
        // ============================================================
        const canvas = document.getElementById('codeCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        // Code characters - mix of Python, JavaScript, symbols for aesthetic
        const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz{}[]()<>;:?!@#$%^&*+=~`python def class import lambda async await self return True False None print eval exec";
        const charArray = chars.split('');
        
        let fontSize = 16;
        let columns;
        let drops = [];
        let frameCount = 0;
        
        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            fontSize = 16;
            columns = Math.floor(width / fontSize);
            drops = [];
            for(let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * -height / fontSize);
            }
        }
        
        function drawCodeRain() {
            // Semi-transparent black for smooth trail effect (creates fading effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.font = `${fontSize}px 'JetBrains Mono', 'Share Tech Mono', monospace`;
            
            for(let i = 0; i < drops.length; i++) {
                // Random character
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                
                // Smooth color variation based on sine wave for organic feel - GREEN
                const intensity = (Math.sin(frameCount * 0.02 + i * 0.1) + 1) / 2;
                const greenBase = 180 + Math.floor(75 * intensity);
                const redBlue = Math.floor(30 + 20 * intensity);
                
                ctx.fillStyle = `rgb(${redBlue}, ${greenBase}, ${redBlue})`;
                
                // Subtle glow effect
                ctx.shadowBlur = 4;
                ctx.shadowColor = `rgba(0, ${Math.floor(200 * intensity)}, 0, 0.6)`;
                
                const x = i * fontSize;
                const y = drops[i] * fontSize;
                
                if(y > 0 && y < height) {
                    ctx.fillText(char, x, y);
                }
                
                // Reset shadow for performance
                ctx.shadowBlur = 0;
                
                // Reset drop to top with smooth probability
                if(drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                
                // Smooth falling speed variation
                drops[i] += 0.6 + Math.random() * 0.5;
            }
            
            // Occasional bright sparks for visual interest (green lightning effect)
            if(Math.random() < 0.015) {
                ctx.font = `${fontSize + 4}px 'JetBrains Mono', monospace`;
                ctx.fillStyle = '#44FF44';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#00ff41';
                const sparkCol = Math.floor(Math.random() * columns);
                const sparkRow = drops[sparkCol] * fontSize;
                if(sparkRow > 30 && sparkRow < height - 30) {
                    ctx.fillText('⚡', sparkCol * fontSize, sparkRow);
                }
                ctx.font = `${fontSize}px 'JetBrains Mono', monospace`;
                ctx.shadowBlur = 0;
            }
            
            frameCount++;
            requestAnimationFrame(drawCodeRain);
        }
        
        window.addEventListener('resize', () => { 
            initCanvas(); 
        });
        
        initCanvas();
        drawCodeRain();
        
        // ============================================================
        // PASSWORD TOGGLE FUNCTIONALITY
        // ============================================================
        function togglePassword() {
            const input = document.getElementById('passInput');
            const icon = document.querySelector('.pass-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        // ============================================================
        // AUTH HANDLER - TELEGRAM REDIRECT REMOVED
        // ============================================================
        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');
            const email = document.querySelector('input[name="email"]').value;
            
            btn.disabled = true;
            btnText.innerText = 'Verifying...';
            btnIcon.className = 'fa-solid fa-circle-notch fa-spin';

            try {
                const formData = new FormData(e.target);
                const response = await fetch('/login', { 
                    method: 'POST', 
                    body: formData 
                });

                const data = await response.json();

                if (response.status === 200) {
                    Swal.fire({
                        icon: 'success', 
                        title: 'Identity Verified', 
                        text: 'Redirecting to your dashboard...',
                        timer: 2000, 
                        showConfirmButton: false, 
                        customClass: { popup: 'swal2-ios-custom' },
                        background: '#0a1a0a',
                        color: '#00FF41'
                    });
                    setTimeout(() => window.location.href = data.url, 1800);
                } 
                else if (response.status === 403) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Access Restricted',
                        text: data.msg || 'This account has been flagged and suspended.',
                        confirmButtonText: 'Close',
                        customClass: { popup: 'swal2-ios-custom' },
                        background: '#0a1a0a',
                        color: '#00FF41'
                    });
                    reset();
                } 
                else {
                    Swal.fire({ 
                        icon: 'warning', 
                        title: 'Auth Failed', 
                        text: data.msg || 'Invalid credentials provided.', 
                        customClass: { popup: 'swal2-ios-custom' },
                        background: '#0a1a0a',
                        color: '#00FF41'
                    });
                    reset();
                }
            } catch (err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'System Error', 
                    text: 'Unable to reach the server. Please try again.', 
                    customClass: { popup: 'swal2-ios-custom' },
                    background: '#0a1a0a',
                    color: '#00FF41'
                });
                reset();
            }

            function reset() {
                btn.disabled = false;
                btnText.innerText = 'Secure Sign In';
                btnIcon.className = 'fa-solid fa-chevron-right';
            }
        }
        
        // Add smooth focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = 'scale(1)';
            });
        });
        
        // Console branding message
        console.log("🔥 JISAN PAIN HOSTING | Secure Login Portal | Code Rain Green | Admin @jisanfire20");
    </script>
</body>
</html>
